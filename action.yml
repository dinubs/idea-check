name: Idea Check with Codex
description: Verify plain-language product ideas with Codex and deterministic gating.
author: Gavin Dinubilo

branding:
  icon: check-circle
  color: purple

inputs:
  openai-api-key:
    description: OpenAI API key passed directly to the official Codex action.
    required: true
  profile:
    description: Verification profile: ci, release, or weekly.
    required: false
    default: ci
  ideas:
    description: Repository-relative directory containing idea Markdown files.
    required: false
    default: ideas
  changed-since:
    description: Optional git revision used to include changed-file context.
    required: false
    default: ""

outputs:
  report:
    description: Repository-relative path to the JSON report.
    value: .idea-check/current/report.json
  summary:
    description: Repository-relative path to the Markdown summary.
    value: .idea-check/current/summary.md

runs:
  using: composite
  steps:
    - name: Prepare Idea Check request
      shell: bash
      env:
        IDEA_CHECK_PROFILE: ${{ inputs.profile }}
        IDEA_CHECK_IDEAS: ${{ inputs.ideas }}
        IDEA_CHECK_CHANGED_SINCE: ${{ inputs.changed-since }}
      run: |
        args=(--root "$GITHUB_WORKSPACE" prepare --profile "$IDEA_CHECK_PROFILE" --ideas "$IDEA_CHECK_IDEAS")
        if [[ -n "$IDEA_CHECK_CHANGED_SINCE" ]]; then
          args+=(--changed-since "$IDEA_CHECK_CHANGED_SINCE")
        fi
        python3 "$GITHUB_ACTION_PATH/skills/verify-ideas/scripts/idea_check.py" "${args[@]}"

    - name: Verify ideas with Codex
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.openai-api-key }}
        prompt-file: .idea-check/current/prompt.md
        output-file: .idea-check/current/report.json
        codex-args: '["--ephemeral", "--output-schema", ".idea-check/current/report-schema.json"]'
        sandbox: workspace-write
        safety-strategy: drop-sudo

    - name: Validate Idea Check report
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/skills/verify-ideas/scripts/idea_check.py" --root "$GITHUB_WORKSPACE" validate
